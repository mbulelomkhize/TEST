<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorting Battle Arena</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h1 class="game-title">
            SORTING<br><span>BATTLE ARENA</span>
        </h1>

        <!-- ALGORITHM -->
        <div class="control-group">

            <h3>ALGORITHM</h3>

            <div class="btn-grid">

                <button onclick="setAlgorithm('bubble')" class="active">Bubble</button>
                <button onclick="setAlgorithm('selection')">Selection</button>
                <button onclick="setAlgorithm('insertion')">Insertion</button>

            </div>

        </div>

        <!-- ACTIONS -->
        <div class="control-group">

            <h3>GAME CONTROL</h3>

            <button onclick="generateArray()">New Game</button>
            <button onclick="startGame()">Start</button>
            <button onclick="resetGame()">Reset</button>

        </div>

        <!-- STATS -->
        <div class="stats-panel">

            <p>🏆 Score: <span id="score">0</span></p>
            <p>⭐ Level: <span id="level">1</span></p>
            <p>⏱ Time: <span id="timer">60</span></p>
            <p>❌ Mistakes: <span id="mistakes">0</span></p>

        </div>

    </div>

    <!-- GAME AREA -->
    <div class="visualizer-container">

        <div id="robot-text">
            🤖 Choose algorithm and start the battle!
        </div>

        <div id="array-container"></div>

        <!-- BUBBLE -->
        <div id="bubble-ui">

            <button onclick="bubbleAnswer(true)">SWAP</button>
            <button onclick="bubbleAnswer(false)">DON'T SWAP</button>

        </div>

        <!-- SELECTION -->
        <div id="selection-ui" style="display:none">

            <button onclick="selectionStep()">SELECT MIN</button>

        </div>

        <!-- INSERTION -->
        <div id="insertion-ui" style="display:none">

            <button onclick="insertionStep()">INSERT</button>

        </div>

    </div>

</div>

<script src="game.js"></script>

</body>
</html>
